apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: divyanshmathur0406/order:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"

            - name: SPRING_APPLICATION_NAME
              value: order-service

            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/postgres
            - name: SPRING_DATASOURCE_USERNAME
              value: order_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: password

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery:8761/eureka/

            - name: SPRING_REDIS_HOST
              value: redis

            - name: MANAGEMENT_TRACING_ZIPKIN_ENDPOINT
              value: http://zipkin:9411/api/v2/spans
---
apiVersion: v1
kind: Service
metadata:
  name: order
spec:
  selector:
    app: order
  ports:
    - port: 8081
      targetPort: 8081